<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>navigation bar</title>
    <style>
        body {
            background-color: rgba(10, 74, 126, 0.9);
            font: 1em sans-serif;
            margin: 0px;
            
            padding: 20px;


        }
         h2{
            color:white;
         }
        

        .nav-container {
            margin-bottom: 30px;
        }

        .nav1 {
            border: 2px solid rgb(13, 10, 6);
            border-radius: 6px;
            padding-left: 20px;
            background-color: rgb(27, 140, 165);



        }

        .nav1 ul {
            list-style-type: none;
            display: flex;
            justify-content: space-around;
            padding: 0px;
            margin: 10px;

        }

        .nav1 li {
            display: inline;
            position: relative;
            
        }

        .nav1 a {
            text-decoration: none;
            color: antiquewhite;

            padding: 5px;
            cursor: pointer;


        }

        .nav1 button {
            border: 2px solid black;
            border-radius: 5px;
        }

        .nav1 button:hover {
            background-color: blueviolet;

        }

        .nav1 button:hover::after {
            transform: scaleX(1);
        }

        .nav1 a::after {
            content: "";
            position: absolute;
            height: 2px;
            width: 100%;
            bottom: 0;
            left: 0;
            background-color: black;
            transform: scaleX(0);
            transition: transform 0.1s ease-in-out;
        }

        .nav1 a:hover::after {
            transform: scaleX(1);

        }

        .nav2 {
             background-color: rgb(27, 140, 165);
             width: 200px;
             padding: 30px; 
             border: 2px solid black;
             border-radius: 8px;
            

        }

        .nav2 ul {
            list-style-type: none;
            margin: 0px;
            padding: 0px;
        }
        .nav2 a {
            color: white;
            text-decoration: none;
            padding: 5px;
            display: block;
            width: 100%;
        
        }
        .nav2 a:hover{
            background-color:rgb(7, 61, 86) ;
        }

        .nav2 li {
            margin-bottom: 13px;  
        }
        .nav2 button{
            border-radius: 8px;
            width: 100%;
            cursor: pointer;
            padding: 6px;
        }
        .nav2 button:hover{
            background-color: rgb(185, 185, 188);
        }

    
        .nav3 {
            border: 2px solid black;
            background-color: rgb(27, 140, 165);
            padding: 10px;
            border-radius: 8px;
            
        }
        .nav3 ul{
            list-style-type: none;
            padding: 0px;
            margin: 0px;
            color: white;
            display: flex;
            justify-content: space-around;
            
        
        }
        
        .nav3 a{
            color: white;
            padding: 0px;
            text-decoration: none;
            padding: 10px;
            display: block;
    
        }
        .nav3 .dropdown-content{
            display: none;
        }
        .nav3 .dropdown:hover .dropdown-content{
            display: block;
            position: absolute;
            background-color: rgb(7, 61, 86);
        }
        .nav3 button{
            border: 2px solid black;
            margin-top: 7px;
            border-radius: 8px;
        }
        .nav3 button:hover{
           background-color: rgb(85, 85, 28);
        }
    </style>
</head>

<body>
    <div class="nav-container">
        <h2>variation1: horizontal with underlined effects</h2>
        <nav class="nav1">
            <ul>
                <li><a href="#">home</a></li>
                <li><a href="#">about us</a></li>
                <li><a href="#">products</a></li>
                <li><a href="#"> support</a></li>
                <li><button class="loginbutton">login</button></li>
            </ul>
        </nav>
    </div>
    <div class="nav-container2">
        <h2>variation2: vertical with hover effect</h2>
        <nav class="nav2">
            <ul>
                <li><a href="#">home</a></li>
                <li><a href="#">about us</a></li>
                <li><a href="#">product</a></li>
                <li><button class="loginbutton">login</button></li>
            </ul>
        </nav>
    </div>
    <div class="horizontal with dropdown">
        <h2> variation3:horizontal with dropdown</h2>
        <nav class="nav3">
            <ul>
                <li><a href="#">home</a></li>
                <li class="dropdown ">
                    <a href="#">about us</a>
                <div class="dropdown-content">
                    <a href="#">our story</a>
                    <a href="#">team</a>
                    <a href="#">content</a>
                </div>
                </li>
                <li><a href="#">product</a></li>
                <li><button class="loginbuttton">login</button></li>
            </ul>
        </nav>
    </div>
</body>

</html>
