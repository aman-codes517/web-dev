<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>juice website template</title>
    <style>
        body{
            height: 100vh;
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
            /* background: linear-gradient(135deg,#8a2be2,#4169e1); */

        }
        .container{
            background: linear-gradient(135deg,#8a2be2,#4169e1);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .content{
            text-align: center;
           background-color: white;
           padding: 2rem;
           border-radius: 8px;
        }
         .logo{
            width: 150px;
            height: 100px;
            object-fit: contain;
         }
        
        h1{
            margin-bottom: 5px;
        }
        form{
           display: flex;
           flex-direction: column; 
        }
        input[ type="email" ]{
          margin-bottom: 8px;
          border-radius: 8px;
          padding: 5px;
        }
        button{
            padding: 5px;
            border-radius: 8px;
            transition: background-color 0.5s ease-in-out;
        }
        button:hover{
            background-color: #8a2be2;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="content">
            <img src="img.png" class="logo" alt=" img logo">
            <h1>coming soon</h1>
            <p>we are working hard to bring something amazing</p>
            <form id="notify-form">
                <input type="email" placeholder="mail" required>
                <button type="submit ">notify me</button>
            </form>
        </div>
    </div>
</body>
</html>
