<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flex masterclass</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: aliceblue;
        }

        .container {
            border: 2px solid black;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .flex-container {
            display: flex;
            height: 200px;
            margin-bottom: 10px;
        }

        .circle {
            width: 50px;
            height: 50px;
            border-radius: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            margin: 5px;
        }

        .pastel1 {
            background-color: palevioletred;
        }
        .pastel2{
            background-color: greenyellow;
        }
        .pastel3{
            background-color: aquamarine;
        }
        .pastel4{
            background-color: yellow;
        }
        .pastel5{
            background-color: burlywood;
        }
        .pastel6{
            background-color: cornflowerblue;
        }
        .pastel7{
            background-color: brown;
        }
        .pastel8{
            background-color: blueviolet;
        }
        .pastel9{
            background-color: crimson;
        }
    </style>
</head>

<body>
    <h1>flexbox masterclass demo</h1>
    <div class="container">
        <h2>default flex</h2>
        <div class="flex-container">
            <div class="circle pastel1">1</div>
            <div class="circle pastel2">2</div>
            <div class="circle pastel3">3</div>
            <div class="circle pastel4">4</div>
            <div class="circle pastel5">5</div>
        </div>
    </div>
    <div class="container">
        <h2>flex-direction:column</h2>
        <div class="flex-container"
        style="flex-direction: column;">
            <div class="circle pastel1">1</div>
            <div class="circle pastel2">2</div>
            <div class="circle pastel3">3</div>
            <div class="circle pastel4">4</div>
            <div class="circle pastel5">5</div>
        </div>
    </div>
    <div class="container">
        <h2>justify-content: space-around</h2>
        <div class="flex-container"
        style="justify-content: space-around;">
            <div class="circle pastel1">1</div>
            <div class="circle pastel2">2</div>
            <div class="circle pastel3">3</div>
            <div class="circle pastel4">4</div>
            <div class="circle pastel5">5</div>
        </div>
    </div>
    <div class="container">
        <h2>align-items:centre</h2>
        <div class="flex-container"style="align-items:center">
            <div class="circle pastel1">1</div>
            <div class="circle pastel2">2</div>
            <div class="circle pastel3">3</div>
            <div class="circle pastel4">4</div>
            <div class="circle pastel5">5</div>
        </div>
    </div>
    <div class="container">
        <h2>flex wrap:wrap </h2>
        <div class="flex-container" style="flex-wrap: wrap;">
            <div class="circle pastel1">1</div>
            <div class="circle pastel2">2</div>
            <div class="circle pastel3">3</div>
            <div class="circle pastel4">4</div>
            <div class="circle pastel5">5</div>
            <div class="circle pastel6">6</div>
            <div class="circle pastel7">7</div>
            <div class="circle pastel8">8</div>
            <div class="circle pastel9">9</div>
        </div>
    </div>
    <div class="container">
        <h2>flex wrap:wrap with space around </h2>
        <div class="flex-container" style="flex-wrap: wrap; align-content: space-around;">
            <div class="circle pastel1">1</div>
            <div class="circle pastel2">2</div>
            <div class="circle pastel3">3</div>
            <div class="circle pastel4">4</div>
            <div class="circle pastel5">5</div>
            <div class="circle pastel6">6</div>
            <div class="circle pastel7">7</div>
            <div class="circle pastel8">8</div>
            <div class="circle pastel9">9</div>
        </div>
    </div>
    <div class="container">
        <h2>order property </h2>
        <div class="flex-container">
            <div class="circle pastel1  " style="order: 5;">1</div>
            <div class="circle pastel2" style="order: 4">2</div>
            <div class="circle pastel3" style="order: 3">3</div>
            <div class="circle pastel4" style="order: 2">4</div>
            <div class="circle pastel5"style="order: 1">5</div>
        </div>
       </div>
        <div class="container">
        <h2>flex grow </h2>
        <div class="flex-container">
            <div class="circle pastel1" style="flex-grow: 1;">1</div>
            <div class="circle pastel2" style="flex-grow: 1;">2</div>
            <div class="circle pastel3" style="flex-grow: 1;">3</div>
            <div class="circle pastel4"style="flex-grow: 1;">4</div>
            <div class="circle pastel5" style="flex-grow: 1;">5</div>
        </div>
    
</body>

</html>
