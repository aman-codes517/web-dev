<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login page</title>
    <style>
        body{
            background-color: rgb(131, 138, 138);
            margin: 0px;
            padding: 0px;
            height: 100vh; 
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container{
            border: 2px solid black;
            border-radius: 8px;
            background-color: bisque;
            padding: 50px;
            width: 200px;
            /* height: 200px; */
            /* display: flex; */
        }
        h2{
            display: flex;
            justify-content: center;
            
        }
        form{
            display: flex;
            flex-direction: column;
        }
        input{
          border: 1px solid rgb(108, 116, 70);
          padding:5px ;
          border-radius: 8px;
          margin-bottom: 8px;
        }
        button{
            border: 1px solid black;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 8px;
            padding: 3px;
        }
        
        button:hover{
            background-color: rgb(109, 109, 66);
            
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Login</h2>
        <form action="">
            <input type="name" name="name" id="name"  placeholder="name">
            <input type="password" name="password" id="password"  placeholder="password">
            <input type="email" name="mail" id="mail"  placeholder="email">
            <button type="submit">log in</button>

        </form>
    </div>
</body>
</html>
